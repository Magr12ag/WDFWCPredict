name: Update World Cup results

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch World Cup API and write results.json
        run: |
          python - <<'PY'
          import json, urllib.request, datetime
          API_URL = "https://worldcup26.ir/get/games"
          def to_number(value):
              if value is None or value == "":
                  return None
              try:
                  return int(value)
              except Exception:
                  try:
                      return float(value)
                  except Exception:
                      return None
          try:
              with urllib.request.urlopen(API_URL, timeout=30) as response:
                  raw = response.read().decode("utf-8")
              payload = json.loads(raw)
              games = payload if isinstance(payload, list) else payload.get("games") or payload.get("data") or []
          except Exception as exc:
              print(f"API fetch failed: {exc}")
              games = []
          normalized = []
          for idx, g in enumerate(games):
              if not isinstance(g, dict):
                  continue
              finished = str(g.get("finished", "")).upper() == "TRUE"
              elapsed = str(g.get("time_elapsed", "")).lower()
              is_started = finished or elapsed not in ("", "notstarted", "not_started", "scheduled")
              home_score = to_number(g.get("home_score"))
              away_score = to_number(g.get("away_score"))
              if not is_started:
                  home_score = None
                  away_score = None
              normalized.append({
                  "n": to_number(g.get("id") or g.get("match_number") or g.get("number") or idx + 1),
                  "home": g.get("home_team_name_en") or g.get("home_team_label") or g.get("home") or "",
                  "away": g.get("away_team_name_en") or g.get("away_team_label") or g.get("away") or "",
                  "homeScore": home_score,
                  "awayScore": away_score,
                  "status": "Final" if finished else ("Live" if is_started else "Scheduled")
              })
          output = {"generated_at": datetime.datetime.utcnow().isoformat() + "Z", "source": API_URL, "games": normalized}
          with open("results.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          print(f"Wrote results.json with {len(normalized)} games")
          PY

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results.json
          git commit -m "Update World Cup results" || echo "No changes to commit"
          git push
